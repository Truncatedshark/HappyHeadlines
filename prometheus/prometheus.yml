global:
  scrape_interval: 15s      # pull metrics from each target every 15 seconds
  evaluation_interval: 15s

scrape_configs:

  - job_name: article-service
    static_configs:
      - targets:
          - articleservice1:8080
          - articleservice2:8080
          - articleservice3:8080

  - job_name: comment-service
    static_configs:
      - targets:
          - commentservice:8080
